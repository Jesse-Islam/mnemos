<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mnemos | Flashcards</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <style>
        :root { --bg: #020617; --card: #0f172a; --text: #f8fafc; --ui-text: #64748b; --accent: #fbbf24; }
        [data-theme="light"] { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --ui-text: #94a3b8; }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden; transition: background 0.4s ease;
            touch-action: none; /* Prevents pull-to-refresh on mobile */
        }
        
        #progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: rgba(0,0,0,0.1); }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s ease; box-shadow: 0 0 15px var(--accent); }

        #toolbar { position: absolute; top: 20px; left: 20px; display: flex; align-items: center; gap: 10px; z-index: 100; background: rgba(128,128,128,0.1); padding: 8px 12px; border-radius: 20px; backdrop-filter: blur(10px); flex-wrap: wrap; max-width: 80vw;}
        .swatch { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .swatch.active { border-color: var(--text); }
        #theme-toggle { background: transparent; border: none; color: var(--text); cursor: pointer; font-size: 16px; padding: 0 5px; }
        .github-link { color: var(--text); text-decoration: none; font-size: 13px; font-weight: 600; border-left: 1px solid var(--ui-text); padding-left: 10px; opacity: 0.7; transition: 0.3s; }
        .github-link:hover { opacity: 1; color: var(--accent); }

        #drop-zone { border: 3px dashed var(--ui-text); padding: 60px 20px; border-radius: 40px; text-align: center; cursor: pointer; width: 90%; max-width: 650px; transition: 0.2s; box-sizing: border-box; }
        #drop-zone:hover { border-color: var(--accent); background: rgba(128,128,128,0.03); }
        .hidden { display: none !important; }

        #study-area { width: 95%; max-width: 1000px; height: 85vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #card-container {perspective: 2500px; width: 100%; height: 60vh; max-height: 500px; position: relative; cursor: pointer; user-select: none; -webkit-user-select: none; }
        
        #card { position: relative; width: 100%; height: 100%; transition: transform 0.3s ease-in-out; transform-style: preserve-3d; }
        #card.is-flipped { transform: rotateY(180deg); }
        
        .side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--card); border-radius: 40px; padding: 40px; box-shadow: 0 20px 50px -20px rgba(0,0,0,0.5); border: 1px solid rgba(128,128,128,0.1); box-sizing: border-box; }
        .back { transform: rotateY(180deg); border: 3px solid var(--accent); }
        
        .category { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 6px; color: var(--accent); position: absolute; top: 30px; font-weight: 800; text-align: center; width: 100%;}
        .content { font-size: 1.8rem; font-weight: 700; line-height: 1.2; text-align: center; width: 100%; word-break: break-word; overflow-wrap: break-word; max-height: 70%; overflow-y: auto; }

        #controls { margin-top: 25px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .control-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; width: 100%; }
        
        .action-btn { background: var(--card); border: 1px solid var(--ui-text); color: var(--text); padding: 10px 15px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .action-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .action-btn kbd { background: rgba(128,128,128,0.2); padding: 2px 6px; border-radius: 6px; font-size: 0.8rem; font-family: monospace; }
        
        .disabled { opacity: 0.3; pointer-events: none; filter: grayscale(1); }
        
        #stats { position: absolute; top: 25px; right: 25px; font-size: 0.9rem; color: var(--ui-text); font-weight: 700; letter-spacing: 1px; z-index: 100;}
        #tts-indicator { position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); font-size: 0.8rem; color: var(--accent); opacity: 0; transition: 0.2s; font-weight: 700; pointer-events: none; }
        #tts-indicator.active { opacity: 1; bottom: -15px; }

        .btn { background: var(--accent); color: var(--bg); border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 20px; transition: 0.2s; font-family: inherit; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }

        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        #modal { background: var(--card); padding: 30px; border-radius: 25px; width: 100%; max-width: 450px; border: 1px solid var(--ui-text); text-align: left; box-sizing: border-box; }
	/* Visual Feedback Stamps */
        #stamp {
            position: absolute; top: -70px; left: 50%; transform: translateX(-50%) scale(0.5);
            font-size: 2.2rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            border: 4px solid; border-radius: 20px; padding: 10px 30px;
            opacity: 0; pointer-events: none; z-index: 50; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(5px);
        }
        #stamp.show { opacity: 1; transform: translateX(-50%) scale(1); }
        .s-hard { color: #f43f5e; border-color: #f43f5e; }
        .s-easy { color: #3b82f6; border-color: #3b82f6; }
        .s-master { color: #10b981; border-color: #10b981; }
        .s-undo { color: #bd93f9; border-color: #bd93f9; }
        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            #toolbar { top: 15px; left: 15px; padding: 6px 10px; }
            #stats { top: 20px; right: 15px; font-size: 0.75rem; }
            .content { font-size: 1.4rem; }
            .side { padding: 30px 20px; }
            #drop-zone h1 { font-size: 2rem !important; }
            .action-btn { padding: 8px 12px; font-size: 0.85rem; }
            .action-btn kbd { display: none; } /* Hide keyboard hints on mobile to save space */
        }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div id="toolbar">
        <button id="theme-toggle" title="Toggle Mode">🌙</button>
        <div class="swatch active" style="background:#fbbf24" onclick="applyTheme('midnight', this)" title="Midnight"></div>
        <div class="swatch" style="background:#10b981" onclick="applyTheme('cyber', this)" title="Cyber"></div>
        <div class="swatch" style="background:#bd93f9" onclick="applyTheme('lavender', this)" title="Aura Lavender"></div>
        <div class="swatch" style="background:#E07A5F" onclick="applyTheme('terracotta', this)" title="Terracotta"></div>
        <div class="swatch" style="background:#f43f5e" onclick="applyTheme('rosewater', this)" title="Rosewater"></div>
        <a href="https://github.com/Jesse-Islam/mnemos" target="_blank" class="github-link">GitHub</a>
    </div>

    <div id="stats">DECK: <span id="count">0</span> | UNDO: <span id="h-count">0</span></div>

    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
        <h1 style="font-size: 2.8rem; margin-bottom: 10px; margin-top: 0;">Mnemos</h1>
        <p style="color: var(--ui-text); line-height: 1.5; font-size: 1.1rem;">Drop CSV or tap to upload</p>
        <div style="display:flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
            <button class="btn" onclick="event.stopPropagation(); document.getElementById('file-input').click()">Upload File</button>
            <button class="btn btn-outline" onclick="event.stopPropagation(); showModal()">Create Deck</button>
        </div>
        <input type="file" id="file-input" style="display:none" accept=".csv">
    </div>

    <div id="modal-overlay" onclick="hideModal()">
        <div id="modal" onclick="event.stopPropagation()">
            <h2 style="margin-top:0; color:var(--accent);">Create Your Deck</h2>
            <p>Your CSV file should have exactly three columns:</p>
            <ol style="line-height: 1.8;">
                <li><code>Question</code></li>
                <li><code>Answer</code></li>
                <li><code>Category</code></li>
            </ol>
            <div style="display:flex; gap: 10px; margin-top: 20px;">
                <button class="btn" style="flex:1" onclick="downloadTemplate()">Template</button>
                <button class="btn btn-outline" onclick="hideModal()">Close</button>
            </div>
        </div>
    </div>

    <div id="study-area" class="hidden">
        <div id="card-container">
            <div id="stamp"></div> <div id="card">
            <div id="card">
                <div class="side front">
                    <div class="category" id="cat-front">Category</div>
                    <div id="q-text" class="content">Question</div>
                </div>
                <div class="side back">
                    <div id="a-text" class="content">Answer</div>
                </div>
            </div>
            <div id="tts-indicator">🔊 SPEAKING...</div>
        </div>
        
        <div id="controls">
            <div class="control-row">
                <button id="btn-reveal" class="action-btn" onclick="toggleFlip()"><kbd>Space</kbd> Reveal / Flip</button>
            </div>
            <div id="grade-row" class="control-row disabled">
                <button class="action-btn" onclick="grade('1')"><kbd>1</kbd> 👈 Hard</button>
                <button class="action-btn" onclick="grade('2')"><kbd>2</kbd> ☝️ Easy</button>
                <button class="action-btn" onclick="grade('3')"><kbd>3</kbd> 👉 Mastered</button>
            </div>
            <div class="control-row">
                <button class="action-btn" onclick="speak()"><kbd>S</kbd> Speak</button>
                <button class="action-btn" onclick="undo()"><kbd>Z</kbd> 👇 Undo</button>
                <button class="action-btn" onclick="location.reload()"><kbd>R</kbd> Reset</button>
            </div>
        </div>
    </div>

    <script>
        const themes = {
            midnight: { dark: ['#020617', '#0f172a', '#fbbf24'], light: ['#f8fafc', '#ffffff', '#b45309'] },
            cyber: { dark: ['#000000', '#050505', '#10b981'], light: ['#f0fff4', '#ffffff', '#059669'] },
            lavender: { dark: ['#0d0b14', '#1a1626', '#bd93f9'], light: ['#f5f3ff', '#ffffff', '#7c3aed'] },
            terracotta: { dark: ['#1c1917', '#292524', '#E07A5F'], light: ['#fff7ed', '#ffffff', '#c2410c'] },
            rosewater: { dark: ['#1c1917', '#292524', '#f43f5e'], light: ['#fff1f2', '#ffffff', '#e11d48'] }
        };

        let deck = [], history = [], totalCards = 0, isFlipped = false, isTransitioning = false;
        
        const cardEl = document.getElementById('card');
        const gradeRow = document.getElementById('grade-row');
        const btnReveal = document.getElementById('btn-reveal');
        const qText = document.getElementById('q-text');
        const aText = document.getElementById('a-text');
        const catFront = document.getElementById('cat-front');
        const countEl = document.getElementById('count');
        const hCountEl = document.getElementById('h-count');
        const progressBar = document.getElementById('progress-bar');
        const cardContainer = document.getElementById('card-container');

        // Theme initialization remains the same
        function applyTheme(name, element = null) {
            const mode = document.documentElement.getAttribute('data-theme') || 'dark';
            const colors = themes[name][mode];
            document.documentElement.style.setProperty('--bg', colors[0]);
            document.documentElement.style.setProperty('--card', colors[1]);
            document.documentElement.style.setProperty('--accent', colors[2]);
            localStorage.setItem('mn-theme', name);
            if(element) {
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                element.classList.add('active');
            }
        }

        document.getElementById('theme-toggle').onclick = () => {
            const target = (document.documentElement.getAttribute('data-theme') || 'dark') === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', target);
            document.getElementById('theme-toggle').innerText = target === 'light' ? '☀️' : '🌙';
            applyTheme(localStorage.getItem('mn-theme') || 'midnight');
            localStorage.setItem('mn-mode', target);
        };

        const savedMode = localStorage.getItem('mn-mode') || 'dark';
        document.documentElement.setAttribute('data-theme', savedMode);
        document.getElementById('theme-toggle').innerText = savedMode === 'light' ? '☀️' : '🌙';
        
        const savedTheme = localStorage.getItem('mn-theme') || 'midnight';
        const swatchTitles = {'midnight':'Midnight', 'cyber':'Cyber', 'lavender':'Aura Lavender', 'terracotta':'Terracotta', 'rosewater':'Rosewater'};
        const activeSwatch = Array.from(document.querySelectorAll('.swatch')).find(s => s.title === swatchTitles[savedTheme]);
        applyTheme(savedTheme, activeSwatch);

        function showModal() { document.getElementById('modal-overlay').style.display = 'flex'; }
        function hideModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        function downloadTemplate() {
            const a = document.createElement('a');
            a.setAttribute('href', 'https://raw.githubusercontent.com/Jesse-Islam/mnemos/main/example.csv');
            a.setAttribute('download', 'mnemos_template.csv');
            a.click();
        }

        document.getElementById('file-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const rows = event.target.result.split('\n').filter(r => r.trim());
                deck = rows.slice(1).map(r => {
                    const cols = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return { q: cols[0]?.replace(/"/g,'').trim() || '', a: cols[1]?.replace(/"/g,'').trim() || '', c: (cols[2] || 'General').trim() };
                }).filter(i => i.q);
                totalCards = deck.length;
                document.getElementById('drop-zone').classList.add('hidden');
                document.getElementById('study-area').classList.remove('hidden');
                updateDisplay();
            };
            reader.readAsText(e.target.files[0]);
        };

        function updateDisplay() {
            if (!deck.length && totalCards > 0) {
                qText.innerText = "Session Complete 🏆";
                aText.innerText = "Press Reset to Restart";
                catFront.innerText = "DONE";
                progressBar.style.width = "100%";
                return;
            }
            qText.innerText = deck[0].q;
            aText.innerText = deck[0].a;
            catFront.innerText = deck[0].c;
            countEl.innerText = deck.length;
            hCountEl.innerText = history.length;
            progressBar.style.width = `${((totalCards - deck.length) / totalCards) * 100}%`;
            
            if (window.renderMathInElement) {
                renderMathInElement(document.body, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}], throwOnError: false });
            }
        }

        function speak() {
            window.speechSynthesis.cancel();
            if(!deck.length) return;
            
            const textToRead = isFlipped ? deck[0].a : deck[0].q;
            const msg = new SpeechSynthesisUtterance(textToRead);
            
            const voices = window.speechSynthesis.getVoices();
            const offlineVoices = voices.filter(voice => voice.localService === true);
            
            if (offlineVoices.length > 0) {
                const preferredOffline = offlineVoices.find(v => v.lang.startsWith('en')) || offlineVoices[0];
                msg.voice = preferredOffline;
            }

            msg.onstart = () => document.getElementById('tts-indicator').classList.add('active');
            msg.onend = () => document.getElementById('tts-indicator').classList.remove('active');
            window.speechSynthesis.speak(msg);
        }

        function toggleFlip() {
            if (isTransitioning || document.getElementById('study-area').classList.contains('hidden') || !deck.length) return;
            isFlipped = !isFlipped;
            cardEl.classList.toggle('is-flipped');
            if (isFlipped) {
                gradeRow.classList.remove('disabled');
                btnReveal.classList.add('disabled');
            } else {
                gradeRow.classList.add('disabled');
                btnReveal.classList.remove('disabled');
            }
        }

        function grade(key) {
            if (isTransitioning || !isFlipped || !deck.length) return;
            isTransitioning = true;
            window.speechSynthesis.cancel();
            
            const current = deck.shift();
            history.push({ card: current, type: key });
            
            if (key === '1') deck.splice(Math.min(3, deck.length), 0, current);
            if (key === '2') deck.splice(Math.min(10, deck.length), 0, current);

            isFlipped = false;
            cardEl.classList.remove('is-flipped');
            gradeRow.classList.add('disabled');
            btnReveal.classList.remove('disabled');

            setTimeout(() => { updateDisplay(); }, 150);
            setTimeout(() => { isTransitioning = false; }, 300);
        }

        function undo() {
            if (isTransitioning || history.length === 0) return;
            isTransitioning = true;
            window.speechSynthesis.cancel();

            const last = history.pop();
            const indexToRemove = deck.indexOf(last.card);
            if (indexToRemove > -1) deck.splice(indexToRemove, 1);
            deck.unshift(last.card);

            cardEl.style.transition = 'none';
            isFlipped = false;
            cardEl.classList.remove('is-flipped');
            gradeRow.classList.add('disabled');
            btnReveal.classList.remove('disabled');
            
            updateDisplay();
            void cardEl.offsetHeight; 
            
            cardEl.style.transition = 'transform 0.3s ease-in-out';
            isTransitioning = false;
        }

// --- Stamp Feedback Helper ---
        const stampEl = document.getElementById('stamp');
        function flashStamp(text, className) {
            stampEl.innerText = text;
            stampEl.className = `show ${className}`;
            setTimeout(() => { stampEl.classList.remove('show'); }, 400);
        }

        // --- Core Overrides to support Drag Physics ---
        function toggleFlip() {
            if (isTransitioning || document.getElementById('study-area').classList.contains('hidden') || !deck.length) return;
            isFlipped = !isFlipped;
            cardEl.style.transform = ''; // Clear inline drag physics
            cardEl.classList.toggle('is-flipped');
            if (isFlipped) {
                gradeRow.classList.remove('disabled');
                btnReveal.classList.add('disabled');
            } else {
                gradeRow.classList.add('disabled');
                btnReveal.classList.remove('disabled');
            }
        }

        function grade(key) {
            if (isTransitioning || !isFlipped || !deck.length) return;
            isTransitioning = true;
            window.speechSynthesis.cancel();
            
            // Show flash feedback for button/keyboard users
            if (key === '1') flashStamp('HARD', 's-hard');
            if (key === '2') flashStamp('EASY', 's-easy');
            if (key === '3') flashStamp('MASTERED', 's-master');
            
            const current = deck.shift();
            history.push({ card: current, type: key });
            
            if (key === '1') deck.splice(Math.min(3, deck.length), 0, current);
            if (key === '2') deck.splice(Math.min(10, deck.length), 0, current);

            isFlipped = false;
            cardEl.style.transform = ''; // Clear inline drag physics
            cardEl.classList.remove('is-flipped');
            gradeRow.classList.add('disabled');
            btnReveal.classList.remove('disabled');

            setTimeout(() => { updateDisplay(); }, 150);
            setTimeout(() => { isTransitioning = false; }, 300);
        }

        function undo() {
            if (isTransitioning || history.length === 0) return;
            isTransitioning = true;
            window.speechSynthesis.cancel();
            
            flashStamp('UNDO', 's-undo');

            const last = history.pop();
            const indexToRemove = deck.indexOf(last.card);
            if (indexToRemove > -1) deck.splice(indexToRemove, 1);
            deck.unshift(last.card);

            cardEl.style.transition = 'none';
            isFlipped = false;
            cardEl.style.transform = ''; // Clear inline drag physics
            cardEl.classList.remove('is-flipped');
            gradeRow.classList.add('disabled');
            btnReveal.classList.remove('disabled');
            
            updateDisplay();
            void cardEl.offsetHeight; 
            
            cardEl.style.transition = 'transform 0.3s ease-in-out';
            isTransitioning = false;
        }

	// --- Interactive Touch & Mouse Drag Engine ---
        let startX = 0, startY = 0, currentX = 0, currentY = 0, isDragging = false;

        cardContainer.addEventListener('pointerdown', e => {
            if (isTransitioning || !deck.length) return;
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            cardEl.style.transition = 'none'; // Disable snap transition while dragging
            cardContainer.setPointerCapture(e.pointerId);
        });

        cardContainer.addEventListener('pointermove', e => {
            if (!isDragging) return;
            currentX = e.clientX - startX;
            currentY = e.clientY - startY;
            
            // 1. Physically tilt and move the card
            const rotate = currentX * 0.04; 
            
            // FIXED: Translate FIRST, then apply the 180deg flip so the drag direction doesn't invert!
            cardEl.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotate}deg) ${isFlipped ? 'rotateY(180deg)' : ''}`;

            // 2. Show dynamic stamp overlay
            const absX = Math.abs(currentX);
            const absY = Math.abs(currentY);
            
            if (absX > 40 || absY > 40) { // Drag threshold to show text
                stampEl.classList.add('show');
                stampEl.className = 'show'; // Reset colors
                if (absX > absY) {
                    if (!isFlipped) { stampEl.classList.remove('show'); return; }
                    if (currentX > 0) { stampEl.innerText = "MASTERED"; stampEl.classList.add('s-master'); }
                    else { stampEl.innerText = "HARD"; stampEl.classList.add('s-hard'); }
                } else {
                    if (currentY < 0 && isFlipped) { stampEl.innerText = "EASY"; stampEl.classList.add('s-easy'); }
                    // FIXED: Only show Undo if there is actually history to undo
                    else if (currentY > 0 && history.length > 0) { stampEl.innerText = "UNDO"; stampEl.classList.add('s-undo'); }
                    else { stampEl.classList.remove('show'); }
                }
            } else {
                stampEl.classList.remove('show');
            }
        });

        cardContainer.addEventListener('pointerup', e => {
            if (!isDragging) return;
            isDragging = false;
            cardContainer.releasePointerCapture(e.pointerId);
            
            const absX = Math.abs(currentX);
            const absY = Math.abs(currentY);

            // Re-enable smooth CSS transitions
            cardEl.style.transition = 'transform 0.3s ease-in-out';

            // Just a tap? Flip it!
            if (absX < 20 && absY < 20) {
                stampEl.classList.remove('show');
                toggleFlip();
            } 
            // Dragged far enough to commit? (Commit threshold)
            else if (absX > 90 || absY > 90) {
                let committed = false;
                
                if (absX > absY) {
                    if (isFlipped) {
                        committed = true;
                        if (currentX > 0) grade('3');
                        else grade('1');
                    }
                } else {
                    if (currentY < 0 && isFlipped) {
                        committed = true;
                        grade('2');
                    } else if (currentY > 0 && history.length > 0) { // FIXED: Prevent undo commit if empty history
                        committed = true;
                        undo();
                    }
                }

                // If user dragged but the action wasn't allowed (e.g. dragging sideways on front of card)
                if (!committed) {
                    stampEl.classList.remove('show');
                    cardEl.style.transform = isFlipped ? 'rotateY(180deg)' : '';
                }
            } 
            // Didn't drag far enough? Snap back to center
            else {
                stampEl.classList.remove('show');
                cardEl.style.transform = isFlipped ? 'rotateY(180deg)' : '';
            }
            
            currentX = 0; currentY = 0;
        });

        cardContainer.addEventListener('pointercancel', () => {
            isDragging = false;
            cardEl.style.transition = 'transform 0.3s ease-in-out';
            cardEl.style.transform = isFlipped ? 'rotateY(180deg)' : '';
            stampEl.classList.remove('show');
            currentX = 0; currentY = 0;
        });

        // Desktop Keyboard bindings
        window.onkeydown = (e) => {
            if (isTransitioning || document.getElementById('study-area').classList.contains('hidden')) return;
            const key = e.key.toLowerCase();
            
            if (e.code === 'Space') { e.preventDefault(); toggleFlip(); }
            if (key === 's') speak();
            if (['1', '2', '3'].includes(key)) grade(key);
            if (key === 'z') undo();
            if (key === 'r') location.reload();
        };
    </script>
</body>
</html>
